<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Quiz app</title>

  <script type="module" defer src="./src/main.js"></script>
</head>
<body>

  <!-- Quiz menu start -->

    <div class="flex flex-row">
      <input type="checkbox" class="checkbox" id="checkbox">
      <label for="checkbox" class="checkbox-label">
        <span class="ball"></span>
      </label>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"><path fill="#626C7F" d="M11.775 4.522A7.5 7.5 0 1 1 4.898 16.09c2.104-.57 4.974-1.953 6.24-5.326.828-2.211.876-4.408.637-6.241ZM20.184 12a8.997 8.997 0 0 0-9.315-8.994.75.75 0 0 0-.713.888c.345 1.821.42 4.092-.424 6.342-1.2 3.201-4.203 4.26-6.115 4.606a.75.75 0 0 0-.542 1.066A9 9 0 0 0 20.184 12Z"/></svg>
  </header>
  <main>
    <section class="quiz-menu flex flex-row">
      <div>
        <h1 class="quiz-menu__heading text-preset-2-mobile-light">Welcome to the <span class="text-preset-2-mobile-medium">Frontend Quiz!</span></h1>
        <p class="quiz-menu__paragraph text-preset-5-mobile">Pick a subject to get started.</p>
      </div>
      
      <div class="quiz-menu__buttons">
        <button class="button html-btn">HTML</button>
        <button class="button css-btn">CSS</button>
        <button class="button js-btn">JavaScript</button>
        <button class="button access-btn">Accessibility</button>
      </div>
    </section>
  </main>

</html>
